<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>MMA Career Universe 2</title>

<style>

body{
margin:0;
background:#0f0f0f;
font-family:Arial,sans-serif;
color:white;
text-align:center;
}

.app{
max-width:430px;
margin:auto;
padding:10px;
}

.card{
background:#1b1b1b;
border-radius:18px;
padding:14px;
margin:12px 0;
box-shadow:0 0 12px #000;
}

h1{
color:gold;
margin-top:10px;
}

button,input,select{
padding:11px;
margin:5px;
border:none;
border-radius:10px;
font-weight:bold;
}

button{
background:gold;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.stat{
background:#292929;
padding:10px;
border-radius:12px;
}

.energy{
color:#00d5ff;
}

.rank{
color:gold;
}

.bar{
height:18px;
background:#444;
border-radius:10px;
overflow:hidden;
margin:8px 0;
}

.fill{
height:100%;
width:100%;
background:limegreen;
}

#fightScreen{
display:none;
}

.arena{
position:relative;
height:260px;
background:linear-gradient(#222,#111);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.floor{
position:absolute;
bottom:0;
height:65px;
width:100%;
background:#333;
}

.fighter{
position:absolute;
bottom:65px;
width:78px;
height:145px;
transition:.12s;
}

.body{
position:absolute;
bottom:0;
width:78px;
height:110px;
background:#c28b5c;
border-radius:35px 35px 15px 15px;
}

.body:before{
content:"";
position:absolute;
top:-38px;
left:19px;
width:38px;
height:38px;
background:#f1c27d;
border-radius:50%;
}

.shorts{
position:absolute;
bottom:8px;
left:12px;
width:52px;
height:26px;
border-radius:8px;
background:red;
}

.hit{
transform:translateX(20px);
}

.kick{
transform:translateY(-15px) rotate(10deg);
}

.block{
filter:brightness(1.5);
}

#log{
background:black;
border-radius:12px;
padding:10px;
height:140px;
overflow-y:auto;
font-size:13px;
text-align:left;
}

.champion{
color:gold;
font-size:18px;
font-weight:bold;
}

.small{
font-size:12px;
opacity:.8;
}

</style>
</head>

<body>

<div class="app">

<h1>MMA Career Universe 2</h1>

<div class="card" id="creator">

<h2>Создай бойца</h2>

<input id="fighterName" value="Мой Боец">

<select id="style">
<option value="striker">Ударник</option>
<option value="wrestler">Борец</option>
<option value="balanced">Универсал</option>
</select>

<select id="shorts">
<option value="red">Красные шорты</option>
<option value="blue">Синие шорты</option>
<option value="black">Чёрные шорты</option>
<option value="gold">Золотые шорты</option>
</select>

<button onclick="createPlayer()">Начать карьеру</button>

</div>

<div class="card">

<h2 id="playerName">Боец</h2>

<div id="belt"></div>

<div class="stats">

<div class="stat">
Рейтинг<br>
<b class="rank" id="rating">50</b>
</div>

<div class="stat">
Деньги<br>
<b id="money">500</b>$
</div>

<div class="stat">
Победы<br>
<b id="wins">0</b>
</div>

<div class="stat">
Поражения<br>
<b id="losses">0</b>
</div>

<div class="stat">
Сила<br>
<b id="power">10</b>
</div>

<div class="stat">
Защита<br>
<b id="defense">10</b>
</div>

<div class="stat">
Энергия<br>
<b class="energy" id="energy">100</b>
</div>

<div class="stat">
Уровень<br>
<b id="level">1</b>
</div>

</div>

</div>

<div class="card">

<h2>Тренировки</h2>

<button onclick="train('power')">🥊 Сила</button>
<button onclick="train('defense')">🛡️ Защита</button>
<button onclick="recover()">⚡ Восстановление</button>

<p class="small">
Тренировки тратят энергию.
</p>

</div>

<div class="card">

<h2>Магазин</h2>

<button onclick="buy('gloves')">🥊 Перчатки +2 сила (500$)</button>
<button onclick="buy('vitamins')">💊 Витамины +20 энергия (300$)</button>
<button onclick="buy('belt')">🏆 Пояс чемпиона (5000$)</button>

</div>

<div class="card">

<h2>Карьера</h2>

<button onclick="findOpponent()">🔍 Найти соперника</button>

<p id="opponentText">
Соперник не найден
</p>

<button onclick="startFight()">🔥 Начать бой</button>

</div>

<div class="card" id="fightScreen">

<h2>БОЙ</h2>

<div class="bar">
<div id="playerHP" class="fill"></div>
</div>

<div class="bar">
<div id="enemyHP" class="fill"></div>
</div>

<div class="arena">

<div id="fighter1" class="fighter" style="left:40px;">
<div class="body">
<div id="shortsColor" class="shorts"></div>
</div>
</div>

<div id="fighter2" class="fighter" style="right:40px;">
<div class="body">
<div class="shorts" style="background:blue"></div>
</div>
</div>

<div class="floor"></div>

</div>

<button onclick="attack('punch')">👊 Удар</button>
<button onclick="attack('kick')">🦵 Нога</button>
<button onclick="attack('block')">🛡️ Блок</button>
<button onclick="attack('special')">🔥 Добивание</button>

</div>

<div class="card">

<h2>Новости</h2>

<div id="log">
Создай бойца, чтобы начать карьеру.
</div>

</div>

</div>

<script>

let player={
name:"Боец",
rating:50,
money:500,
wins:0,
losses:0,
power:10,
defense:10,
energy:100,
level:1,
champion:false,
style:"balanced",
shorts:"red"
};

let enemy=null;
let fight=false;

let playerHp=100;
let enemyHp=100;

let blocking=false;

const enemies=[

{name:"Рико Шторм",rating:45,power:8,defense:8,hp:90,reward:250},
{name:"Макс Орёл",rating:55,power:11,defense:10,hp:100,reward:450},
{name:"Хан Волк",rating:68,power:14,defense:13,hp:120,reward:800},
{name:"Перейра Стоун",rating:80,power:18,defense:14,hp:130,reward:1500},
{name:"Титан Блэйз",rating:95,power:22,defense:18,hp:150,reward:3000}

];

function createPlayer(){

player.name=document.getElementById("fighterName").value;
player.style=document.getElementById("style").value;
player.shorts=document.getElementById("shorts").value;

if(player.style==="striker"){
player.power=14;
player.defense=8;
}

if(player.style==="wrestler"){
player.power=10;
player.defense=14;
}

if(player.style==="balanced"){
player.power=12;
player.defense=12;
}

document.getElementById("creator").style.display="none";

log("Карьера началась: "+player.name);

updateUI();

}

function updateUI(){

document.getElementById("playerName").textContent=player.name;

document.getElementById("rating").textContent=player.rating;
document.getElementById("money").textContent=player.money;
document.getElementById("wins").textContent=player.wins;
document.getElementById("losses").textContent=player.losses;
document.getElementById("power").textContent=player.power;
document.getElementById("defense").textContent=player.defense;
document.getElementById("energy").textContent=player.energy;
document.getElementById("level").textContent=player.level;

document.getElementById("belt").innerHTML=
player.champion ?
"<div class='champion'>🏆 Чемпион мира</div>" : "";

saveGame();

}

function train(type){

if(player.energy<15){
log("Не хватает энергии.");
return;
}

player.energy-=15;

if(type==="power"){
player.power+=1;
log("Сила увеличена.");
}

if(type==="defense"){
player.defense+=1;
log("Защита увеличена.");
}

player.rating+=1;

updateUI();

}

function recover(){

player.energy=100;

log("Энергия восстановлена.");

updateUI();

}

function buy(item){

if(item==="gloves"){

if(player.money<500)return;

player.money-=500;
player.power+=2;

log("Ты купил новые перчатки.");

}

if(item==="vitamins"){

if(player.money<300)return;

player.money-=300;
player.energy=Math.min(100,player.energy+20);

log("Ты купил витамины.");

}

if(item==="belt"){

if(player.money<5000)return;

player.money-=5000;
player.champion=true;

log("Ты купил чемпионский пояс.");

}

updateUI();

}

function findOpponent(){

let available=enemies.filter(e=>e.rating<=player.rating+20);

enemy=available[Math.floor(Math.random()*available.length)];

document.getElementById("opponentText").innerHTML=
enemy.name+
"<br>Рейтинг: "+enemy.rating;

log("Найден соперник: "+enemy.name);

}

function startFight(){

if(!enemy){
findOpponent();
}

fight=true;

playerHp=100+player.defense*2;
enemyHp=enemy.hp;

document.getElementById("fightScreen").style.display="block";

document.getElementById("shortsColor").style.background=
player.shorts;

updateFightBars();

log("Начался бой против "+enemy.name);

}

function attack(type){

if(!fight)return;

const sprite=document.getElementById("fighter1");

if(type==="block"){

blocking=true;

sprite.classList.add("block");

setTimeout(()=>{
blocking=false;
sprite.classList.remove("block");
},700);

log("Ты поставил блок.");

return;

}

if(type==="punch"){

sprite.classList.add("hit");

setTimeout(()=>{
sprite.classList.remove("hit");
},120);

}

if(type==="kick"||type==="special"){

sprite.classList.add("kick");

setTimeout(()=>{
sprite.classList.remove("kick");
},150);

}

let dmg=player.power+Math.floor(Math.random()*8);

if(type==="kick") dmg+=5;
if(type==="special") dmg+=15;

if(Math.random()<0.18){
dmg*=2;
log("Критический удар!");
}

enemyHp-=dmg;

if(enemyHp<0) enemyHp=0;

log(player.name+" нанёс "+dmg+" урона.");

updateFightBars();

if(enemyHp<=0){
winFight();
return;
}

enemyAttack();

}

function enemyAttack(){

const sprite=document.getElementById("fighter2");

sprite.classList.add("hit");

setTimeout(()=>{
sprite.classList.remove("hit");
},120);

let dmg=enemy.power+Math.floor(Math.random()*7);

if(blocking){
dmg=Math.floor(dmg/2);
}

playerHp-=dmg;

if(playerHp<0) playerHp=0;

log(enemy.name+" ударил на "+dmg+" урона.");

updateFightBars();

if(playerHp<=0){
loseFight();
}

}

function updateFightBars(){

document.getElementById("playerHP").style.width=
(playerHp/(100+player.defense*2))*100+"%";

document.getElementById("enemyHP").style.width=
(enemyHp/enemy.hp)*100+"%";

}

function winFight(){

fight=false;

player.wins++;

player.money+=enemy.reward;

player.rating+=5;

if(player.rating>player.level*20){
player.level++;
log("Новый уровень!");
}

if(player.rating>=95){
player.champion=true;
}

log("Победа! +"+enemy.reward+"$");

document.getElementById("fightScreen").style.display="none";

enemy=null;

document.getElementById("opponentText").textContent=
"Соперник не найден";

updateUI();

}

function loseFight(){

fight=false;

player.losses++;

player.rating=Math.max(40,player.rating-3);

log("Ты проиграл бой.");

document.getElementById("fightScreen").style.display="none";

enemy=null;

document.getElementById("opponentText").textContent=
"Соперник не найден";

updateUI();

}

function log(text){

document.getElementById("log").innerHTML=
text+"<br>"+document.getElementById("log").innerHTML;

}

function saveGame(){

localStorage.setItem("mmaCareerSave",JSON.stringify(player));

}

function loadGame(){

const save=localStorage.getItem("mmaCareerSave");

if(save){

player=JSON.parse(save);

document.getElementById("creator").style.display="none";

log("Сохранение загружено.");

updateUI();

}

}

loadGame();

</script>

</body>
</html>
