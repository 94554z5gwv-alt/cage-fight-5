<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MMA Career Universe 4</title>

<style>

body{
margin:0;
background:#0c0c0c;
font-family:Arial,sans-serif;
color:white;
text-align:center;
overflow-x:hidden;
}

.app{
max-width:430px;
margin:auto;
padding:10px;
}

.card{
background:#181818;
border-radius:18px;
padding:14px;
margin:12px 0;
box-shadow:0 0 12px #000;
}

h1{
color:gold;
}

button,input,select{
padding:11px;
margin:5px;
border:none;
border-radius:10px;
font-weight:bold;
}

button{
background:gold;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.stat{
background:#292929;
padding:10px;
border-radius:12px;
}

.bar{
height:18px;
background:#444;
border-radius:10px;
overflow:hidden;
margin:8px 0;
}

.fill{
height:100%;
width:100%;
background:limegreen;
transition:.25s;
}

.energyFill{
background:#00cfff;
}

#fightScreen{
display:none;
}

.arena{
position:relative;
height:290px;
background:linear-gradient(#222,#101010);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.floor{
position:absolute;
bottom:0;
height:70px;
width:100%;
background:#2d2d2d;
}

.fighter{
position:absolute;
bottom:70px;
width:85px;
height:160px;
transition:.18s;
}

.body{
position:absolute;
bottom:0;
width:85px;
height:120px;
background:#c28b5c;
border-radius:40px 40px 18px 18px;
}

.body:before{
content:"";
position:absolute;
top:-40px;
left:22px;
width:40px;
height:40px;
background:#f1c27d;
border-radius:50%;
}

.shorts{
position:absolute;
bottom:8px;
left:12px;
width:58px;
height:28px;
border-radius:8px;
background:red;
}

.hitAnim{
transform:translateX(30px) rotate(4deg);
}

.kickAnim{
transform:translateY(-15px) rotate(12deg);
}

.takedownAnim{
transform:translateX(45px) rotate(-18deg) scale(.9);
}

.submissionAnim{
transform:scale(.85) rotate(-25deg);
}

.blockAnim{
filter:brightness(1.6);
}

.enemyHit{
animation:enemyShake .22s;
}

@keyframes enemyShake{
0%{transform:translateX(0)}
25%{transform:translateX(-8px)}
50%{transform:translateX(8px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}

#log{
background:black;
border-radius:12px;
padding:10px;
height:170px;
overflow-y:auto;
font-size:13px;
text-align:left;
}

.gold{
color:gold;
font-weight:bold;
}

.small{
font-size:12px;
opacity:.8;
}

</style>
</head>

<body>

<div class="app">

<h1>MMA Career Universe 4</h1>

<div class="card" id="creator">

<h2>Создай бойца</h2>

<input id="fighterName" value="Мой Боец">

<select id="style">
<option value="striker">Ударник</option>
<option value="wrestler">Борец</option>
<option value="balanced">Универсал</option>
</select>

<select id="weight">
<option value="lightweight">Лёгкий вес</option>
<option value="middleweight">Средний вес</option>
<option value="heavyweight">Тяжёлый вес</option>
</select>

<select id="shorts">
<option value="red">Красные шорты</option>
<option value="blue">Синие шорты</option>
<option value="black">Чёрные шорты</option>
<option value="gold">Золотые шорты</option>
</select>

<button onclick="createPlayer()">Начать карьеру</button>

</div>

<div class="card">

<h2 id="playerName">Боец</h2>

<div id="belts"></div>

<div class="stats">

<div class="stat">Рейтинг<br><b id="rating">50</b></div>
<div class="stat">Деньги<br><b id="money">500</b>$</div>
<div class="stat">Победы<br><b id="wins">0</b></div>
<div class="stat">Поражения<br><b id="losses">0</b></div>
<div class="stat">Сила<br><b id="power">10</b></div>
<div class="stat">Грэпплинг<br><b id="grappling">10</b></div>
<div class="stat">Защита<br><b id="defense">10</b></div>
<div class="stat">Энергия<br><b id="energy">100</b></div>

</div>

</div>

<div class="card">

<h2>Тренировки</h2>

<button onclick="train('power')">🥊 Сила</button>
<button onclick="train('grappling')">🤼 Грэпплинг</button>
<button onclick="train('defense')">🛡️ Защита</button>

</div>

<div class="card">

<h2>Энергия</h2>

<button onclick="recoverEnergy()">
⚡ Восстановить (500$)
</button>

</div>

<div class="card">

<h2>Карьера</h2>

<button onclick="findOpponent()">
🔍 Найти соперника
</button>

<p id="opponentText">
Соперник не найден
</p>

<button onclick="startFight()">
🔥 Начать бой
</button>

</div>

<div class="card" id="fightScreen">

<h2>БОЙ</h2>

<div class="bar">
<div id="playerHP" class="fill"></div>
</div>

<div class="bar">
<div id="enemyHP" class="fill"></div>
</div>

<div class="bar">
<div id="energyBar" class="fill energyFill"></div>
</div>

<div class="arena">

<div id="fighter1" class="fighter" style="left:40px;">
<div class="body">
<div id="shortsColor" class="shorts"></div>
</div>
</div>

<div id="fighter2" class="fighter" style="right:40px;">
<div class="body">
<div class="shorts" style="background:blue"></div>
</div>
</div>

<div class="floor"></div>

</div>

<button onclick="attack('punch')">👊</button>
<button onclick="attack('kick')">🦵</button>
<button onclick="attack('block')">🛡️</button>
<button onclick="attack('takedown')">🤼</button>
<button onclick="attack('submission')">🔒</button>
<button onclick="attack('special')">🔥</button>

</div>

<div class="card">

<h2>Новости</h2>

<div id="log">
Создай бойца.
</div>

</div>

</div>

<script>

let player={
name:"Боец",
rating:50,
money:500,
wins:0,
losses:0,
power:10,
grappling:10,
defense:10,
energy:100,
style:"balanced",
weight:"lightweight",
shorts:"red",
belts:[]
};

let enemy=null;

let fight=false;

let playerHp=100;
let enemyHp=100;

let grounded=false;
let blocking=false;

const baseEnemies={

lightweight:[
"Рико Шторм",
"Лео Блэйд",
"Макс Орёл",
"Джей Хантер"
],

middleweight:[
"Хан Волк",
"Рэй Торнадо",
"Нико Блэк",
"Кейн Фрост"
],

heavyweight:[
"Титан Блэйз",
"Гром Стоун",
"Рагнар",
"Озон Кинг"
]

};

function createPlayer(){

player.name=document.getElementById("fighterName").value;
player.style=document.getElementById("style").value;
player.weight=document.getElementById("weight").value;
player.shorts=document.getElementById("shorts").value;

if(player.style==="striker"){
player.power=15;
player.grappling=8;
}

if(player.style==="wrestler"){
player.power=10;
player.grappling=16;
}

if(player.style==="balanced"){
player.power=12;
player.grappling=12;
}

document.getElementById("creator").style.display="none";

updateUI();

log("Карьера началась.");

}

function updateUI(){

document.getElementById("playerName").textContent=
player.name;

document.getElementById("rating").textContent=
player.rating;

document.getElementById("money").textContent=
player.money;

document.getElementById("wins").textContent=
player.wins;

document.getElementById("losses").textContent=
player.losses;

document.getElementById("power").textContent=
player.power;

document.getElementById("grappling").textContent=
player.grappling;

document.getElementById("defense").textContent=
player.defense;

document.getElementById("energy").textContent=
player.energy;

document.getElementById("belts").innerHTML=
player.belts.map(b=>"🏆 "+b).join("<br>");

saveGame();

}

function train(type){

if(player.energy<20){
log("Не хватает энергии.");
return;
}

player.energy-=20;

const limit=Math.floor(player.rating/5)+15;

if(type==="power"&&player.power<limit){
player.power++;
}

if(type==="grappling"&&player.grappling<limit){
player.grappling++;
}

if(type==="defense"&&player.defense<limit){
player.defense++;
}

player.rating++;

log("Ты стал сильнее.");

updateUI();

}

function recoverEnergy(){

if(player.money<500){
log("Не хватает денег.");
return;
}

player.money-=500;
player.energy=100;

log("Энергия восстановлена.");

updateUI();

}

function generateEnemy(){

const names=baseEnemies[player.weight];

const name=
names[Math.floor(Math.random()*names.length)];

const scale=Math.floor(player.rating/6);

return{
name:name,
power:8+scale+Math.floor(Math.random()*4),
grappling:8+scale+Math.floor(Math.random()*4),
defense:8+scale+Math.floor(Math.random()*4),
hp:100+scale*3,
reward:300+scale*120
};

}

function findOpponent(){

enemy=generateEnemy();

document.getElementById("opponentText").innerHTML=
enemy.name+
"<br>Сила: "+enemy.power+
"<br>Грэпплинг: "+enemy.grappling;

log("Найден соперник: "+enemy.name);

}

function startFight(){

if(player.energy<15){
log("Мало энергии.");
return;
}

if(!enemy){
findOpponent();
}

fight=true;

grounded=false;

playerHp=100+player.defense*2;
enemyHp=enemy.hp;

document.getElementById("fightScreen").style.display=
"block";

document.getElementById("shortsColor").style.background=
player.shorts;

updateFightBars();

}

function attack(type){

if(!fight)return;

if(player.energy<=0){
log("Нет энергии.");
return;
}

const fighter=document.getElementById("fighter1");
const enemySprite=document.getElementById("fighter2");

if(type==="block"){

blocking=true;

fighter.classList.add("blockAnim");

setTimeout(()=>{
blocking=false;
fighter.classList.remove("blockAnim");
},700);

return;

}

let dmg=0;
let energyCost=0;

if(type==="punch"){

fighter.classList.add("hitAnim");

setTimeout(()=>{
fighter.classList.remove("hitAnim");
},160);

dmg=player.power+Math.random()*8;
energyCost=8;

}

if(type==="kick"){

fighter.classList.add("kickAnim");

setTimeout(()=>{
fighter.classList.remove("kickAnim");
},180);

dmg=player.power+10+Math.random()*8;
energyCost=15;

}

if(type==="takedown"){

fighter.classList.add("takedownAnim");

setTimeout(()=>{
fighter.classList.remove("takedownAnim");
},220);

dmg=player.grappling+12;
energyCost=20;

grounded=true;

log("Тейкдаун успешен!");

}

if(type==="submission"){

if(!grounded){
log("Сначала сделай тейкдаун!");
return;
}

fighter.classList.add("submissionAnim");

setTimeout(()=>{
fighter.classList.remove("submissionAnim");
},260);

dmg=player.grappling+22;
energyCost=28;

log("Попытка сабмишена!");

}

if(type==="special"){

fighter.classList.add("kickAnim");

setTimeout(()=>{
fighter.classList.remove("kickAnim");
},220);

dmg=player.power+28;
energyCost=35;

}

player.energy-=energyCost;

enemySprite.classList.add("enemyHit");

setTimeout(()=>{
enemySprite.classList.remove("enemyHit");
},220);

enemyHp-=Math.floor(dmg);

if(enemyHp<0)enemyHp=0;

log("Ты нанёс "+Math.floor(dmg)+" урона.");

updateFightBars();

if(enemyHp<=0){
winFight();
return;
}

enemyAttack();

}

function enemyAttack(){

const enemySprite=document.getElementById("fighter2");

enemySprite.classList.add("hitAnim");

setTimeout(()=>{
enemySprite.classList.remove("hitAnim");
},160);

let dmg=enemy.power+Math.random()*8;

if(blocking){
dmg=Math.floor(dmg/2);
}

playerHp-=Math.floor(dmg);

if(playerHp<0)playerHp=0;

log(enemy.name+" ударил на "+Math.floor(dmg));

updateFightBars();

if(playerHp<=0){
loseFight();
}

}

function updateFightBars(){

document.getElementById("playerHP").style.width=
(playerHp/(100+player.defense*2))*100+"%";

document.getElementById("enemyHP").style.width=
(enemyHp/enemy.hp)*100+"%";

document.getElementById("energyBar").style.width=
player.energy+"%";

}

function winFight(){

fight=false;

player.wins++;

player.money+=enemy.reward;

player.rating+=5;

if(player.rating>=90 &&
!player.belts.includes(player.weight)){

player.belts.push(player.weight);

log("Ты стал чемпионом категории!");

}

log("Победа! +"+enemy.reward+"$");

document.getElementById("fightScreen").style.display=
"none";

enemy=null;

updateUI();

}

function loseFight(){

fight=false;

player.losses++;

player.rating=Math.max(40,player.rating-3);

log("Ты проиграл.");

document.getElementById("fightScreen").style.display=
"none";

enemy=null;

updateUI();

}

function log(text){

document.getElementById("log").innerHTML=
text+"<br>"+document.getElementById("log").innerHTML;

}

function saveGame(){

localStorage.setItem(
"mmaCareerUniverse4",
JSON.stringify(player)
);

}

function loadGame(){

const save=localStorage.getItem(
"mmaCareerUniverse4"
);

if(save){

player=JSON.parse(save);

document.getElementById("creator").style.display=
"none";

updateUI();

log("Сохранение загружено.");

}

}

loadGame();

</script>

</body>
</html>
