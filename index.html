<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MMA Career Universe</title>

<style>
body{
  margin:0;
  background:#101010;
  color:white;
  font-family:Arial,sans-serif;
  text-align:center;
}
.app{
  max-width:430px;
  margin:auto;
  padding:12px;
}
h1{color:gold;font-size:25px}
.card{
  background:#1d1d1d;
  border-radius:18px;
  padding:15px;
  margin:12px 0;
  box-shadow:0 0 12px #000;
}
input,select,button{
  padding:11px;
  margin:5px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
button{
  background:gold;
}
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.stat{
  background:#2b2b2b;
  border-radius:12px;
  padding:10px;
}
.bar{
  background:#444;
  height:16px;
  border-radius:10px;
  overflow:hidden;
  margin:7px 0;
}
.fill{
  height:100%;
  width:100%;
  background:limegreen;
}
#log{
  background:#000;
  border-radius:12px;
  padding:10px;
  height:120px;
  overflow-y:auto;
  font-size:13px;
}
.fightArea{
  display:none;
}
.arena{
  position:relative;
  height:260px;
  background:linear-gradient(#222,#111);
  border-radius:18px;
  overflow:hidden;
  margin-top:10px;
}
.floor{
  position:absolute;
  bottom:0;
  height:60px;
  width:100%;
  background:#333;
}
.fighter{
  position:absolute;
  bottom:60px;
  width:70px;
  height:130px;
  transition:.12s;
}
.body{
  width:70px;
  height:100px;
  background:#c28b5c;
  border-radius:30px 30px 15px 15px;
  position:absolute;
  bottom:0;
}
.body:before{
  content:"";
  position:absolute;
  top:-36px;
  left:17px;
  width:36px;
  height:36px;
  background:#f1c27d;
  border-radius:50%;
}
.shorts{
  position:absolute;
  bottom:8px;
  left:12px;
  width:46px;
  height:25px;
  background:red;
  border-radius:8px;
}
.hit{transform:translateX(22px)}
.kick{transform:translateY(-15px) rotate(10deg)}
.champ{
  color:gold;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="app">
  <h1>MMA Career Universe</h1>

  <div class="card" id="createBox">
    <h2>Создай бойца</h2>
    <input id="fighterName" placeholder="Имя бойца" value="Мой Боец">
    <select id="style">
      <option value="striker">Ударник</option>
      <option value="wrestler">Борец</option>
      <option value="balanced">Универсал</option>
    </select>
    <select id="shortsColor">
      <option value="red">Красные шорты</option>
      <option value="blue">Синие шорты</option>
      <option value="black">Чёрные шорты</option>
      <option value="gold">Золотые шорты</option>
    </select>
    <button onclick="createFighter()">Начать карьеру</button>
  </div>

  <div class="card">
    <h2 id="name">Боец не создан</h2>
    <p id="belt"></p>
    <div class="stats">
      <div class="stat">Рейтинг<br><b id="rating">60</b></div>
      <div class="stat">Деньги<br><b id="money">0</b>$</div>
      <div class="stat">Победы<br><b id="wins">0</b></div>
      <div class="stat">Поражения<br><b id="losses">0</b></div>
      <div class="stat">Сила<br><b id="power">10</b></div>
      <div class="stat">Стамина<br><b id="stamina">100</b></div>
    </div>
  </div>

  <div class="card" id="careerBox">
    <h2>Карьера</h2>
    <button onclick="train('power')">Тренировать силу</button>
    <button onclick="train('stamina')">Тренировать стамину</button>
    <button onclick="chooseOpponent()">Найти соперника</button>
    <p id="opponent">Соперник не выбран</p>
    <button onclick="startFight()">Начать бой</button>
  </div>

  <div class="card fightArea" id="fightBox">
    <h2>Бой</h2>

    <div class="bar"><div id="hpPlayer" class="fill"></div></div>
    <div class="bar"><div id="hpEnemy" class="fill"></div></div>

    <div class="arena">
      <div id="pSprite" class="fighter" style="left:40px;">
        <div class="body"><div id="pShorts" class="shorts"></div></div>
      </div>

      <div id="eSprite" class="fighter" style="right:40px;">
        <div class="body"><div class="shorts" style="background:blue"></div></div>
      </div>

      <div class="floor"></div>
    </div>

    <button onclick="attack('punch')">👊 Удар</button>
    <button onclick="attack('kick')">🦵 Нога</button>
    <button onclick="attack('special')">🔥 Добивание</button>
  </div>

  <div class="card">
    <h2>Журнал</h2>
    <div id="log">Создай бойца, чтобы начать карьеру.</div>
  </div>
</div>

<script>
let player={
  name:"Мой Боец",
  rating:60,
  money:0,
  wins:0,
  losses:0,
  power:10,
  stamina:100,
  champion:false,
  style:"balanced",
  shorts:"red"
};

let opponent=null;
let fight=false;
let playerHp=100;
let enemyHp=100;

const opponents=[
  {name:"Рико Шторм",rating:58,power:9,hp:90,reward:300},
  {name:"Макс Орёл",rating:65,power:12,hp:105,reward:500},
  {name:"Хан Волк",rating:72,power:14,hp:120,reward:800},
  {name:"Алекс Стоун",rating:80,power:17,hp:115,reward:1200},
  {name:"Титан Гром",rating:90,power:22,hp:140,reward:2500}
];

function createFighter(){
  player.name=document.getElementById("fighterName").value || "Мой Боец";
  player.style=document.getElementById("style").value;
  player.shorts=document.getElementById("shortsColor").value;

  if(player.style==="striker"){
    player.power=14;
    player.stamina=90;
  }else if(player.style==="wrestler"){
    player.power=11;
    player.stamina=115;
  }else{
    player.power=12;
    player.stamina=100;
  }

  document.getElementById("createBox").style.display="none";
  log("Карьера началась: "+player.name);
  updateUI();
}

function updateUI(){
  document.getElementById("name").textContent=player.name;
  document.getElementById("rating").textContent=player.rating;
  document.getElementById("money").textContent=player.money;
  document.getElementById("wins").textContent=player.wins;
  document.getElementById("losses").textContent=player.losses;
  document.getElementById("power").textContent=player.power;
  document.getElementById("stamina").textContent=player.stamina;
  document.getElementById("belt").innerHTML=player.champion ? "<span class='champ'>🏆 Чемпион лиги</span>" : "";
}

function train(type){
  if(type==="power"){
    player.power+=1;
    player.money=Math.max(0,player.money-100);
    log("Ты потренировал силу.");
  }else{
    player.stamina+=5;
    player.money=Math.max(0,player.money-100);
    log("Ты потренировал стамину.");
  }

  if(player.rating<99) player.rating+=1;
  updateUI();
}

function chooseOpponent(){
  let available=opponents.filter(o=>o.rating<=player.rating+15);
  opponent=available[Math.floor(Math.random()*available.length)];
  document.getElementById("opponent").textContent=
    "Соперник: "+opponent.name+" | рейтинг "+opponent.rating;
  log("Выбран соперник: "+opponent.name);
}

function startFight(){
  if(!opponent){
    chooseOpponent();
  }

  fight=true;
  playerHp=100+Math.floor(player.stamina/5);
  enemyHp=opponent.hp;
  document.getElementById("fightBox").style.display="block";
  document.getElementById("pShorts").style.background=player.shorts;
  updateFightBars();
  log("Бой начался против "+opponent.name);
}

function attack(type){
  if(!fight)return;

  const sprite=document.getElementById("pSprite");

  if(type==="punch"){
    sprite.classList.add("hit");
    setTimeout(()=>sprite.classList.remove("hit"),120);
  }else{
    sprite.classList.add("kick");
    setTimeout(()=>sprite.classList.remove("kick"),150);
  }

  let dmg=player.power+Math.floor(Math.random()*8);

  if(type==="kick") dmg+=5;
  if(type==="special") dmg+=15;

  if(Math.random()<0.15){
    dmg*=2;
    log("Критический удар!");
  }

  enemyHp-=dmg;
  if(enemyHp<0)enemyHp=0;

  log(player.name+" нанёс "+dmg+" урона.");

  if(enemyHp<=0){
    winFight();
    return;
  }

  enemyTurn();
  updateFightBars();
}

function enemyTurn(){
  const sprite=document.getElementById("eSprite");
  sprite.classList.add("hit");
  setTimeout(()=>sprite.classList.remove("hit"),120);

  let dmg=opponent.power+Math.floor(Math.random()*7);
  playerHp-=dmg;
  if(playerHp<0)playerHp=0;

  log(opponent.name+" ударил на "+dmg+" урона.");

  if(playerHp<=0){
    loseFight();
  }
}

function winFight(){
  fight=false;
  player.wins++;
  player.money+=opponent.reward;
  player.rating+=5;

  log("Победа! Ты заработал "+opponent.reward+"$");

  if(player.rating>=90 && !player.champion){
    player.champion=true;
    log("Ты стал чемпионом лиги!");
  }

  document.getElementById("fightBox").style.display="none";
  opponent=null;
  document.getElementById("opponent").textContent="Соперник не выбран";
  updateUI();
}

function loseFight(){
  fight=false;
  player.losses++;
  player.rating=Math.max(40,player.rating-3);

  log("Поражение. Нужно тренироваться.");

  document.getElementById("fightBox").style.display="none";
  opponent=null;
  document.getElementById("opponent").textContent="Соперник не выбран";
  updateUI();
}

function updateFightBars(){
  document.getElementById("hpPlayer").style.width=Math.max(0,playerHp/150*100)+"%";
  document.getElementById("hpEnemy").style.width=Math.max(0,enemyHp/opponent.hp*100)+"%";
}

function log(text){
  document.getElementById("log").innerHTML=text+"<br>"+document.getElementById("log").innerHTML;
}

updateUI();
</script>
</body>
</html>
