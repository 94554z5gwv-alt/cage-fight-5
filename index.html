<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>MMA Career Universe 3</title>

<style>

body{
margin:0;
background:#0d0d0d;
font-family:Arial,sans-serif;
color:white;
text-align:center;
}

.app{
max-width:430px;
margin:auto;
padding:10px;
}

.card{
background:#1a1a1a;
border-radius:18px;
padding:14px;
margin:12px 0;
box-shadow:0 0 12px #000;
}

h1{
color:gold;
}

button,input,select{
padding:11px;
margin:5px;
border:none;
border-radius:10px;
font-weight:bold;
}

button{
background:gold;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.stat{
background:#2a2a2a;
padding:10px;
border-radius:12px;
}

.bar{
height:18px;
background:#444;
border-radius:10px;
overflow:hidden;
margin:8px 0;
}

.fill{
height:100%;
width:100%;
background:limegreen;
}

.energyFill{
background:#00cfff;
}

.arena{
position:relative;
height:260px;
background:linear-gradient(#222,#111);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.floor{
position:absolute;
bottom:0;
height:65px;
width:100%;
background:#333;
}

.fighter{
position:absolute;
bottom:65px;
width:78px;
height:145px;
transition:.12s;
}

.body{
position:absolute;
bottom:0;
width:78px;
height:110px;
background:#c28b5c;
border-radius:35px 35px 15px 15px;
}

.body:before{
content:"";
position:absolute;
top:-38px;
left:19px;
width:38px;
height:38px;
background:#f1c27d;
border-radius:50%;
}

.shorts{
position:absolute;
bottom:8px;
left:12px;
width:52px;
height:26px;
border-radius:8px;
background:red;
}

.hit{
transform:translateX(20px);
}

.kick{
transform:translateY(-15px) rotate(10deg);
}

.grapple{
transform:scale(0.9) rotate(-6deg);
}

.block{
filter:brightness(1.5);
}

#fightScreen{
display:none;
}

#log{
background:black;
border-radius:12px;
padding:10px;
height:160px;
overflow-y:auto;
font-size:13px;
text-align:left;
}

.gold{
color:gold;
font-weight:bold;
}

.small{
font-size:12px;
opacity:.8;
}

</style>
</head>

<body>

<div class="app">

<h1>MMA Career Universe 3</h1>

<div class="card" id="creator">

<h2>Создай бойца</h2>

<input id="fighterName" value="Мой Боец">

<select id="style">
<option value="striker">Ударник</option>
<option value="wrestler">Борец</option>
<option value="balanced">Универсал</option>
</select>

<select id="weight">
<option value="lightweight">Лёгкий вес</option>
<option value="middleweight">Средний вес</option>
<option value="heavyweight">Тяжёлый вес</option>
</select>

<select id="shorts">
<option value="red">Красные шорты</option>
<option value="blue">Синие шорты</option>
<option value="black">Чёрные шорты</option>
<option value="gold">Золотые шорты</option>
</select>

<button onclick="createPlayer()">Начать карьеру</button>

</div>

<div class="card">

<h2 id="playerName">Боец</h2>

<div id="champions"></div>

<div class="stats">

<div class="stat">
Рейтинг<br>
<b id="rating">50</b>
</div>

<div class="stat">
Деньги<br>
<b id="money">500</b>$
</div>

<div class="stat">
Победы<br>
<b id="wins">0</b>
</div>

<div class="stat">
Поражения<br>
<b id="losses">0</b>
</div>

<div class="stat">
Сила<br>
<b id="power">10</b>
</div>

<div class="stat">
Грэпплинг<br>
<b id="grappling">10</b>
</div>

<div class="stat">
Защита<br>
<b id="defense">10</b>
</div>

<div class="stat">
Энергия<br>
<b id="energy">100</b>
</div>

<div class="stat">
Вес<br>
<b id="weightClass">-</b>
</div>

<div class="stat">
Уровень<br>
<b id="level">1</b>
</div>

</div>

</div>

<div class="card">

<h2>Тренировки</h2>

<button onclick="train('power')">🥊 Сила</button>
<button onclick="train('grappling')">🤼 Грэпплинг</button>
<button onclick="train('defense')">🛡️ Защита</button>

<p class="small">
Тренировки тратят энергию.
</p>

</div>

<div class="card">

<h2>Восстановление</h2>

<button onclick="recoverEnergy()">
⚡ Восстановить энергию (500$)
</button>

</div>

<div class="card">

<h2>Весовые категории</h2>

<button onclick="changeWeight('lightweight')">
Лёгкий вес
</button>

<button onclick="changeWeight('middleweight')">
Средний вес
</button>

<button onclick="changeWeight('heavyweight')">
Тяжёлый вес
</button>

</div>

<div class="card">

<h2>Карьера</h2>

<button onclick="findOpponent()">
🔍 Найти соперника
</button>

<p id="opponentText">
Соперник не найден
</p>

<button onclick="startFight()">
🔥 Начать бой
</button>

</div>

<div class="card" id="fightScreen">

<h2>БОЙ</h2>

<div class="bar">
<div id="playerHP" class="fill"></div>
</div>

<div class="bar">
<div id="enemyHP" class="fill"></div>
</div>

<div class="bar">
<div id="energyBar" class="fill energyFill"></div>
</div>

<div class="arena">

<div id="fighter1" class="fighter" style="left:40px;">
<div class="body">
<div id="shortsColor" class="shorts"></div>
</div>
</div>

<div id="fighter2" class="fighter" style="right:40px;">
<div class="body">
<div class="shorts" style="background:blue"></div>
</div>
</div>

<div class="floor"></div>

</div>

<button onclick="attack('punch')">👊 Удар</button>
<button onclick="attack('kick')">🦵 Нога</button>
<button onclick="attack('block')">🛡️ Блок</button>
<button onclick="attack('takedown')">🤼 Тейкдаун</button>
<button onclick="attack('submission')">🔒 Сабмишен</button>
<button onclick="attack('special')">🔥 Добивание</button>

</div>

<div class="card">

<h2>Новости</h2>

<div id="log">
Создай бойца.
</div>

</div>

</div>

<script>

let player={
name:"Боец",
rating:50,
money:500,
wins:0,
losses:0,
power:10,
grappling:10,
defense:10,
energy:100,
level:1,
weight:"lightweight",
belts:[],
style:"balanced",
shorts:"red"
};

let enemy=null;
let fight=false;

let playerHp=100;
let enemyHp=100;

let blocking=false;

const enemies={

lightweight:[
{name:"Рико Шторм",rating:45,power:8,grappling:7,defense:8,hp:90,reward:300}
],

middleweight:[
{name:"Макс Орёл",rating:65,power:13,grappling:11,defense:12,hp:110,reward:700}
],

heavyweight:[
{name:"Титан Блэйз",rating:90,power:22,grappling:16,defense:18,hp:150,reward:2500}
]

};

function createPlayer(){

player.name=document.getElementById("fighterName").value;
player.style=document.getElementById("style").value;
player.weight=document.getElementById("weight").value;
player.shorts=document.getElementById("shorts").value;

if(player.style==="striker"){
player.power=15;
player.grappling=8;
}

if(player.style==="wrestler"){
player.power=10;
player.grappling=16;
}

if(player.style==="balanced"){
player.power=12;
player.grappling=12;
}

document.getElementById("creator").style.display="none";

updateUI();

log("Карьера началась.");

}

function updateUI(){

document.getElementById("playerName").textContent=
player.name;

document.getElementById("rating").textContent=
player.rating;

document.getElementById("money").textContent=
player.money;

document.getElementById("wins").textContent=
player.wins;

document.getElementById("losses").textContent=
player.losses;

document.getElementById("power").textContent=
player.power;

document.getElementById("grappling").textContent=
player.grappling;

document.getElementById("defense").textContent=
player.defense;

document.getElementById("energy").textContent=
player.energy;

document.getElementById("level").textContent=
player.level;

document.getElementById("weightClass").textContent=
player.weight;

document.getElementById("champions").innerHTML=
player.belts.map(b=>"🏆 "+b).join("<br>");

saveGame();

}

function train(type){

if(player.energy<20){
log("Не хватает энергии.");
return;
}

player.energy-=20;

const limit=player.level*5+15;

if(type==="power" && player.power<limit){
player.power++;
}

if(type==="grappling" && player.grappling<limit){
player.grappling++;
}

if(type==="defense" && player.defense<limit){
player.defense++;
}

player.rating++;

if(player.rating>player.level*20){
player.level++;
log("Новый уровень!");
}

updateUI();

}

function recoverEnergy(){

if(player.money<500){
log("Не хватает денег.");
return;
}

player.money-=500;

player.energy=100;

log("Энергия восстановлена.");

updateUI();

}

function changeWeight(newWeight){

player.weight=newWeight;

log("Ты перешёл в категорию: "+newWeight);

updateUI();

}

function findOpponent(){

const list=enemies[player.weight];

enemy=list[Math.floor(Math.random()*list.length)];

document.getElementById("opponentText").innerHTML=
enemy.name+"<br>Рейтинг: "+enemy.rating;

log("Найден соперник.");

}

function startFight(){

if(player.energy<15){
log("Слишком мало энергии.");
return;
}

if(!enemy){
findOpponent();
}

fight=true;

playerHp=100+player.defense*2;
enemyHp=enemy.hp;

document.getElementById("fightScreen").style.display=
"block";

document.getElementById("shortsColor").style.background=
player.shorts;

updateFightBars();

}

function attack(type){

if(!fight)return;

const sprite=document.getElementById("fighter1");

if(type==="block"){

blocking=true;

sprite.classList.add("block");

setTimeout(()=>{
blocking=false;
sprite.classList.remove("block");
},700);

return;

}

if(player.energy<=0){
log("Нет энергии.");
return;
}

let dmg=0;
let energyCost=0;

if(type==="punch"){

sprite.classList.add("hit");

setTimeout(()=>{
sprite.classList.remove("hit");
},120);

dmg=player.power+Math.random()*6;
energyCost=8;

}

if(type==="kick"){

sprite.classList.add("kick");

setTimeout(()=>{
sprite.classList.remove("kick");
},150);

dmg=player.power+10;
energyCost=15;

}

if(type==="takedown"){

sprite.classList.add("grapple");

setTimeout(()=>{
sprite.classList.remove("grapple");
},180);

dmg=player.grappling+12;
energyCost=18;

}

if(type==="submission"){

sprite.classList.add("grapple");

setTimeout(()=>{
sprite.classList.remove("grapple");
},180);

dmg=player.grappling+18;
energyCost=25;

}

if(type==="special"){

sprite.classList.add("kick");

setTimeout(()=>{
sprite.classList.remove("kick");
},180);

dmg=player.power+25;
energyCost=35;

}

player.energy-=energyCost;

enemyHp-=Math.floor(dmg);

if(enemyHp<0)enemyHp=0;

log("Ты нанёс "+Math.floor(dmg)+" урона.");

updateFightBars();

if(enemyHp<=0){
winFight();
return;
}

enemyAttack();

}

function enemyAttack(){

const sprite=document.getElementById("fighter2");

sprite.classList.add("hit");

setTimeout(()=>{
sprite.classList.remove("hit");
},120);

let dmg=enemy.power+Math.random()*8;

if(blocking){
dmg=Math.floor(dmg/2);
}

playerHp-=Math.floor(dmg);

if(playerHp<0)playerHp=0;

log(enemy.name+" ударил на "+Math.floor(dmg));

updateFightBars();

if(playerHp<=0){
loseFight();
}

}

function updateFightBars(){

document.getElementById("playerHP").style.width=
(playerHp/(100+player.defense*2))*100+"%";

document.getElementById("enemyHP").style.width=
(enemyHp/enemy.hp)*100+"%";

document.getElementById("energyBar").style.width=
player.energy+"%";

}

function winFight(){

fight=false;

player.wins++;

player.money+=enemy.reward;

player.rating+=5;

if(player.rating>=90 &&
!player.belts.includes(player.weight)){

player.belts.push(player.weight);

log("Ты стал чемпионом категории!");

}

log("Победа! +"+enemy.reward+"$");

document.getElementById("fightScreen").style.display=
"none";

enemy=null;

updateUI();

}

function loseFight(){

fight=false;

player.losses++;

player.rating=Math.max(40,player.rating-3);

log("Ты проиграл.");

document.getElementById("fightScreen").style.display=
"none";

enemy=null;

updateUI();

}

function log(text){

document.getElementById("log").innerHTML=
text+"<br>"+document.getElementById("log").innerHTML;

}

function saveGame(){

localStorage.setItem(
"mmaCareerUniverse3",
JSON.stringify(player)
);

}

function loadGame(){

const save=localStorage.getItem(
"mmaCareerUniverse3"
);

if(save){

player=JSON.parse(save);

document.getElementById("creator").style.display=
"none";

updateUI();

log("Сохранение загружено.");

}

}

loadGame();

</script>

</body>
</html>
