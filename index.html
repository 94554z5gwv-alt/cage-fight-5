<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>MMA Phaser Fight</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

<style>
body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:Arial;
}
#game{
  width:100vw;
  height:100vh;
}
</style>
</head>

<body>
<div id="game"></div>

<script>
const config = {
  type: Phaser.AUTO,
  parent: "game",
  width: window.innerWidth,
  height: window.innerHeight,
  backgroundColor: "#101010",
  physics: {
    default: "arcade",
    arcade: {
      gravity: { y: 900 },
      debug: false
    }
  },
  scene: {
    preload,
    create,
    update
  }
};

let player, enemy;
let cursors;
let keys;

let playerHP = 100;
let enemyHP = 100;
let playerStamina = 100;

let playerHPText, enemyHPText, staminaText, infoText;
let canAttack = true;
let grounded = false;

new Phaser.Game(config);

function preload(){}

function create(){
  const w = this.scale.width;
  const h = this.scale.height;

  this.add.rectangle(w/2, h-60, w, 120, 0x333333);
  this.add.rectangle(w/2, h-120, w, 6, 0x666666);

  this.add.text(w/2, 25, "MMA PHASER FIGHT", {
    fontSize:"24px",
    color:"#ffd700",
    fontStyle:"bold"
  }).setOrigin(0.5);

  player = createFighter(this, 120, h-220, 0xff4444);
  enemy = createFighter(this, w-120, h-220, 0x3377ff);

  this.physics.add.existing(player.container);
  this.physics.add.existing(enemy.container);

  player.container.body.setCollideWorldBounds(true);
  enemy.container.body.setCollideWorldBounds(true);

  const ground = this.add.rectangle(w/2, h-60, w, 120, 0x333333);
  this.physics.add.existing(ground, true);

  this.physics.add.collider(player.container, ground);
  this.physics.add.collider(enemy.container, ground);

  cursors = this.input.keyboard.createCursorKeys();

  keys = this.input.keyboard.addKeys({
    punch: Phaser.Input.Keyboard.KeyCodes.J,
    kick: Phaser.Input.Keyboard.KeyCodes.K,
    takedown: Phaser.Input.Keyboard.KeyCodes.U,
    submission: Phaser.Input.Keyboard.KeyCodes.I,
    block: Phaser.Input.Keyboard.KeyCodes.L
  });

  playerHPText = this.add.text(15, 65, "HP: 100", {fontSize:"18px", color:"#00ff00"});
  enemyHPText = this.add.text(w-120, 65, "HP: 100", {fontSize:"18px", color:"#00ff00"});
  staminaText = this.add.text(15, 90, "ST: 100", {fontSize:"18px", color:"#00ccff"});

  infoText = this.add.text(w/2, 120, "← → ходить | J удар | K нога | U тейкдаун | I сабмишен | L блок", {
    fontSize:"14px",
    color:"#ffffff",
    align:"center",
    wordWrap:{width:w-30}
  }).setOrigin(0.5);

  this.time.addEvent({
    delay: 1000,
    loop: true,
    callback: () => {
      if(playerStamina < 100){
        playerStamina += grounded ? 2 : 6;
        if(playerStamina > 100) playerStamina = 100;
      }
      enemyAI(this);
      updateUI();
    }
  });
}

function update(){
  if(playerHP <= 0 || enemyHP <= 0) return;

  player.container.body.setVelocityX(0);

  if(cursors.left.isDown){
    player.container.body.setVelocityX(-220);
    player.container.scaleX = -1;
  }

  if(cursors.right.isDown){
    player.container.body.setVelocityX(220);
    player.container.scaleX = 1;
  }

  if(Phaser.Input.Keyboard.JustDown(keys.punch)){
    attack(this, "punch");
  }

  if(Phaser.Input.Keyboard.JustDown(keys.kick)){
    attack(this, "kick");
  }

  if(Phaser.Input.Keyboard.JustDown(keys.takedown)){
    attack(this, "takedown");
  }

  if(Phaser.Input.Keyboard.JustDown(keys.submission)){
    attack(this, "submission");
  }

  if(Phaser.Input.Keyboard.JustDown(keys.block)){
    block(this);
  }
}

function createFighter(scene, x, y, shortsColor){
  const container = scene.add.container(x, y);

  const body = scene.add.rectangle(0, 0, 60, 100, 0xc28b5c);
  const head = scene.add.circle(0, -70, 25, 0xf1c27d);
  const shorts = scene.add.rectangle(0, 35, 52, 28, shortsColor);
  const arm1 = scene.add.rectangle(-42, -10, 16, 65, 0xc28b5c);
  const arm2 = scene.add.rectangle(42, -10, 16, 65, 0xc28b5c);
  const leg1 = scene.add.rectangle(-18, 80, 18, 60, 0xc28b5c);
  const leg2 = scene.add.rectangle(18, 80, 18, 60, 0xc28b5c);

  container.add([leg1, leg2, body, head, shorts, arm1, arm2]);

  return {
    container,
    body,
    head,
    shorts,
    arm1,
    arm2,
    leg1,
    leg2,
    blocking:false
  };
}

function distance(){
  return Math.abs(player.container.x - enemy.container.x);
}

function attack(scene, type){
  if(!canAttack) return;

  if(playerStamina <= 5){
    infoText.setText("Ты устал!");
    return;
  }

  canAttack = false;

  let damage = 0;
  let cost = 0;

  if(type === "punch"){
    cost = 8;
    damage = 10 + Phaser.Math.Between(0, 8);

    scene.tweens.add({
      targets: player.arm2,
      x: 85,
      duration: 90,
      yoyo: true
    });

    infoText.setText("Удар рукой!");
  }

  if(type === "kick"){
    cost = 15;
    damage = 18 + Phaser.Math.Between(0, 10);

    scene.tweens.add({
      targets: player.leg2,
      x: 75,
      y: 40,
      angle: 40,
      duration: 120,
      yoyo: true
    });

    infoText.setText("Лоу-кик!");
  }

  if(type === "takedown"){
    cost = 22;

    scene.tweens.add({
      targets: player.container,
      x: player.container.x + 50,
      angle: -15,
      duration: 160,
      yoyo: true
    });

    if(distance() < 140 && Math.random() < 0.65){
      grounded = true;
      damage = 16;
      infoText.setText("Тейкдаун прошёл! Теперь можно делать сабмишен.");
    } else {
      infoText.setText("Соперник защитился от тейкдауна!");
    }
  }

  if(type === "submission"){
    cost = 28;

    if(!grounded){
      infoText.setText("Сначала сделай тейкдаун!");
      canAttack = true;
      return;
    }

    scene.tweens.add({
      targets: player.container,
      scaleX: 0.8,
      scaleY: 0.8,
      angle: -25,
      duration: 180,
      yoyo: true
    });

    if(Math.random() < 0.5){
      damage = enemyHP;
      infoText.setText("Сабмишен! Победа!");
    } else {
      grounded = false;
      infoText.setText("Соперник вышел из сабмишена!");
    }
  }

  playerStamina -= cost;
  if(playerStamina < 0) playerStamina = 0;

  if(distance() < 150){
    enemyHP -= damage;
    hitEffect(scene, enemy.container);
  }

  if(enemyHP <= 0){
    enemyHP = 0;
    infoText.setText("ПОБЕДА НОКАУТОМ!");
  }

  updateUI();

  scene.time.delayedCall(350, () => {
    canAttack = true;
  });
}

function block(scene){
  player.blocking = true;
  infoText.setText("Блок!");

  scene.tweens.add({
    targets: player.container,
    alpha: 0.6,
    duration: 100,
    yoyo: true,
    repeat: 2
  });

  scene.time.delayedCall(700, () => {
    player.blocking = false;
  });
}

function enemyAI(scene){
  if(playerHP <= 0 || enemyHP <= 0) return;

  if(enemy.container.x > player.container.x + 115){
    enemy.container.x -= 25;
    enemy.container.scaleX = -1;
    return;
  }

  if(Math.random() < 0.25){
    infoText.setText("Соперник пытается тейкдаун!");

    if(Math.random() < 0.5){
      playerHP -= 18;
      grounded = false;
      hitEffect(scene, player.container);
      infoText.setText("Тебя перевели в партер!");
    } else {
      infoText.setText("Ты защитился от тейкдауна!");
    }

    updateUI();
    return;
  }

  let damage = Phaser.Math.Between(8, 18);

  if(player.blocking){
    damage = Math.floor(damage / 2);
  }

  playerHP -= damage;
  hitEffect(scene, player.container);

  if(playerHP <= 0){
    playerHP = 0;
    infoText.setText("ТЫ ПРОИГРАЛ!");
  }

  updateUI();
}

function hitEffect(scene, target){
  scene.tweens.add({
    targets: target,
    x: target.x + Phaser.Math.Between(-12, 12),
    duration: 50,
    yoyo: true,
    repeat: 2
  });
}

function updateUI(){
  playerHPText.setText("HP: " + Math.floor(playerHP));
  enemyHPText.setText("HP: " + Math.floor(enemyHP));
  staminaText.setText("ST: " + Math.floor(playerStamina));
}
</script>
</body>
</html>
