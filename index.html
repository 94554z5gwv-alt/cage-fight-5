<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cage Fight Arena</title>

<style>
body{
margin:0;
background:#111;
font-family:Arial;
overflow:hidden;
color:white;
}

#arena{
position:relative;
width:100vw;
height:100vh;
background:linear-gradient(#222,#111);
overflow:hidden;
}

.floor{
position:absolute;
bottom:0;
width:100%;
height:120px;
background:#222;
border-top:5px solid #444;
}

.fighter{
position:absolute;
bottom:120px;
width:90px;
height:180px;
transition:0.12s;
}

.body{
position:absolute;
bottom:0;
width:90px;
height:140px;
border-radius:40px 40px 20px 20px;
background:#d2b48c;
}

.head{
position:absolute;
top:-45px;
left:20px;
width:50px;
height:50px;
border-radius:50%;
background:#f1c27d;
}

.shorts{
position:absolute;
bottom:10px;
left:15px;
width:60px;
height:35px;
border-radius:10px;
}

.red{background:red;}
.blue{background:royalblue;}

.hpbar{
position:absolute;
top:20px;
width:40%;
height:20px;
background:#444;
border-radius:10px;
overflow:hidden;
}

.hpfill{
height:100%;
background:limegreen;
width:100%;
}

#hp1{
left:20px;
}

#hp2{
right:20px;
}

.controls{
position:absolute;
bottom:10px;
width:100%;
display:flex;
justify-content:space-around;
flex-wrap:wrap;
gap:10px;
}

button{
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
background:gold;
}

#msg{
position:absolute;
top:55px;
width:100%;
text-align:center;
font-size:28px;
font-weight:bold;
color:gold;
}

.hit{
transform:translateX(25px);
}

.kick{
transform:translateY(-20px) rotate(10deg);
}

.block{
filter:brightness(1.5);
}

</style>
</head>

<body>

<div id="arena">

<div id="msg"></div>

<div id="hp1" class="hpbar">
<div id="hpfill1" class="hpfill"></div>
</div>

<div id="hp2" class="hpbar">
<div id="hpfill2" class="hpfill"></div>
</div>

<div id="fighter1" class="fighter" style="left:40px;">
<div class="body">
<div class="head"></div>
<div class="shorts red"></div>
</div>
</div>

<div id="fighter2" class="fighter" style="right:40px;">
<div class="body">
<div class="head"></div>
<div class="shorts blue"></div>
</div>
</div>

<div class="floor"></div>

<div class="controls">

<button onclick="moveLeft()">⬅️</button>
<button onclick="moveRight()">➡️</button>
<button onclick="punch()">👊</button>
<button onclick="kick()">🦵</button>
<button onclick="block()">🛡️</button>

</div>

</div>

<script>

let playerX = 40;
let enemyX = window.innerWidth - 130;

let hp1 = 100;
let hp2 = 100;

const fighter1 = document.getElementById("fighter1");
const fighter2 = document.getElementById("fighter2");

function updateBars(){
document.getElementById("hpfill1").style.width = hp1 + "%";
document.getElementById("hpfill2").style.width = hp2 + "%";
}

function moveLeft(){
playerX -= 20;
if(playerX < 0) playerX = 0;
fighter1.style.left = playerX + "px";
}

function moveRight(){
playerX += 20;
if(playerX > window.innerWidth - 100){
playerX = window.innerWidth - 100;
}
fighter1.style.left = playerX + "px";
}

function distance(){
return Math.abs(playerX - enemyX);
}

function punch(){

fighter1.classList.add("hit");

setTimeout(()=>{
fighter1.classList.remove("hit");
},120);

if(distance() < 130){
let dmg = Math.floor(Math.random()*12)+8;
hp2 -= dmg;
if(hp2 < 0) hp2 = 0;
updateBars();

if(hp2 <= 0){
document.getElementById("msg").innerText = "ПОБЕДА!";
}
}
}

function kick(){

fighter1.classList.add("kick");

setTimeout(()=>{
fighter1.classList.remove("kick");
},150);

if(distance() < 150){
let dmg = Math.floor(Math.random()*18)+10;
hp2 -= dmg;
if(hp2 < 0) hp2 = 0;
updateBars();

if(hp2 <= 0){
document.getElementById("msg").innerText = "НОКАУТ!";
}
}
}

function block(){

fighter1.classList.add("block");

setTimeout(()=>{
fighter1.classList.remove("block");
},600);

}

function enemyAI(){

if(hp2 <= 0 || hp1 <= 0) return;

if(enemyX - playerX > 120){
enemyX -= 10;
fighter2.style.right = (window.innerWidth - enemyX - 90) + "px";
}else{

if(Math.random() < 0.5){

fighter2.classList.add("hit");

setTimeout(()=>{
fighter2.classList.remove("hit");
},120);

hp1 -= Math.floor(Math.random()*10)+5;

}else{

fighter2.classList.add("kick");

setTimeout(()=>{
fighter2.classList.remove("kick");
},150);

hp1 -= Math.floor(Math.random()*15)+8;
}

if(hp1 < 0) hp1 = 0;

updateBars();

if(hp1 <= 0){
document.getElementById("msg").innerText = "ТЫ ПРОИГРАЛ";
}
}
}

updateBars();

setInterval(enemyAI,1000);

</script>

</body>
</html>
